services:
  backend:
    build:
      context: ./backend
    container_name: mindmood-backend
    environment:
      HF_HOME: /cache/huggingface
    ports:
      - "8000:8000"
    volumes:
      - backend_db:/app/db
      - huggingface_cache:/cache/huggingface
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: mindmood-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_db:
  huggingface_cache:
