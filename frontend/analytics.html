<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аналитика - MoodSync</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/analytics.css">
</head>

<body>
    <div class="app-container">
        <!-- Левый сайдбар -->
        <aside class="sidebar">
            <!-- Блок Главная -->
            <div class="sidebar__profile">
                <div class="sidebar__app-info">
                    <a href="./index.html" class="sidebar__app-name">MoodSync</a>
                    <p class="sidebar__app-tagline">Ежедневный дневник настроения</p>
                </div>
            </div>

            <!-- Вертикальное меню -->
            <nav class="sidebar__menu">
                <a href="./home.html" class="sidebar__menu-item">
                    <i class="fas fa-home"></i>
                    <span>Главная</span>
                </a>
                <a href="./history.html" class="sidebar__menu-item">
                    <i class="fas fa-calendar"></i>
                    <span>История</span>
                </a>
                <a href="./analytics.html" class="sidebar__menu-item sidebar__menu-item--active">
                    <i class="fas fa-chart-bar"></i>
                    <span>Аналитика</span>
                </a>
            </nav>

            <!-- Нижний блок -->
            <div class="sidebar__bottom">
                <div class="sidebar__divider"></div>

                <button id="logoutBtn" class="sidebar__logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Выход</span>
                </button>
            </div>
        </aside>

        <!-- Основная область -->
        <main class="main-content">
            <!-- Верх страницы -->
            <div class="analytics__header">
                <div class="analytics__heading">
                    <h1 class="analytics__title">Аналитика</h1>
                    <p class="analytics__subtitle">Обзор вашего эмоционального состояния за неделю.</p>
                </div>
                <button class="analytics__export-button">
                    <i class="fas fa-download"></i>
                    <span>Экспорт данных</span>
                </button>
            </div>

            <!-- Основная сетка -->
            <div class="analytics__grid">
                <!-- Левая колонка -->
                <div class="analytics__main">
                    <!-- Карточка среднего индекса настроения -->
                    <div class="mood-index">
                        <div class="mood-index__header">
                            <h2 class="mood-index__title">Средний индекс настроения</h2>
                            <i class="fas fa-info-circle mood-index__info"></i>
                        </div>
                        <div class="mood-index__body">
                            <div class="mood-index__info">
                                <div class="mood-index__value">7.8</div>
                                <div class="mood-index__change">↗ +0.4 за неделю</div>
                            </div>
                            <div class="mood-index__progress">
                                <div class="mood-index__progress-fill"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Карточка динамики за 7 дней -->
                    <div class="mood-chart">
                        <div class="mood-chart__header">
                            <h2 class="mood-chart__title">Динамика настроения</h2>
                            <div class="date-picker">
                                <i class="fas fa-calendar-alt date-picker__icon"></i>
                                <input type="date" class="date-picker__input date-picker__input--start" id="startDate">
                                <span class="date-picker__separator">—</span>
                                <input type="date" class="date-picker__input date-picker__input--end" id="endDate">
                                <button class="date-picker__apply" id="applyDateRange">
                                    <i class="fas fa-check"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mood-chart__body">
                            <svg class="mood-chart__svg" viewBox="0 0 700 300" preserveAspectRatio="none">
                                <!-- Сетка -->
                                <line x1="50" y1="50" x2="50" y2="250" stroke="#e5e7eb" stroke-width="1" />
                                <line x1="50" y1="250" x2="650" y2="250" stroke="#e5e7eb" stroke-width="1" />

                                <!-- Горизонтальные линии сетки -->
                                <line x1="50" y1="50" x2="650" y2="50" stroke="#f3f4f6" stroke-width="1" />
                                <line x1="50" y1="100" x2="650" y2="100" stroke="#f3f4f6" stroke-width="1" />
                                <line x1="50" y1="150" x2="650" y2="150" stroke="#f3f4f6" stroke-width="1" />
                                <line x1="50" y1="200" x2="650" y2="200" stroke="#f3f4f6" stroke-width="1" />

                                <!-- Пунктирные линии значений -->
                                <line x1="50" y1="75" x2="650" y2="75" stroke="#e5e7eb" stroke-width="1"
                                    stroke-dasharray="5,5" />
                                <line x1="50" y1="125" x2="650" y2="125" stroke="#e5e7eb" stroke-width="1"
                                    stroke-dasharray="5,5" />
                                <line x1="50" y1="175" x2="650" y2="175" stroke="#e5e7eb" stroke-width="1"
                                    stroke-dasharray="5,5" />
                                <line x1="50" y1="225" x2="650" y2="225" stroke="#e5e7eb" stroke-width="1"
                                    stroke-dasharray="5,5" />

                                <!-- Подписи по оси Y -->
                                <text x="40" y="55" text-anchor="end" font-size="12" fill="#718096">10</text>
                                <text x="40" y="105" text-anchor="end" font-size="12" fill="#718096">8</text>
                                <text x="40" y="155" text-anchor="end" font-size="12" fill="#718096">6</text>
                                <text x="40" y="205" text-anchor="end" font-size="12" fill="#718096">4</text>
                                <text x="40" y="255" text-anchor="end" font-size="12" fill="#718096">2</text>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Правая колонка -->
                <div class="analytics__aside">
                    <!-- Карточка нейро-инсайтов -->
                    <div class="neural-insights">
                        <div class="neural-insights__header">
                            <i class="fas fa-bolt neural-insights__icon"></i>
                            <h2 class="neural-insights__title">Нейро-инсайты</h2>
                        </div>
                        <div class="neural-insights__list">
                            <!-- Инсайты будут отрендерены динамически через JS -->
                        </div>
                    </div>

                    <!-- Карточка распределения эмоций -->

                </div>
            </div>
        </main>
    </div>

    <script type="module" src="./js/auth.js"></script>
    <script type="module" src="./js/analytics.js"></script>
</body>
