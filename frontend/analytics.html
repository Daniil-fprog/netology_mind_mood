<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аналитика - MoodSync</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/analytics.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Левый сайдбар -->
        <aside class="sidebar">
            <!-- Блок Главная -->
            <div class="sidebar__profile">
                <div class="sidebar__app-info">
                    <a href="./index.html" class="sidebar__app-name">MoodSync</a>
                    <p class="sidebar__app-tagline">Ежедневный дневник настроения</p>
                </div>
            </div>

            <!-- Вертикальное меню -->
            <nav class="sidebar__menu">
                <a href="./home.html" class="sidebar__menu-item">
                    <i class="fas fa-home"></i>
                    <span>Главная</span>
                </a>
                <a href="./history.html" class="sidebar__menu-item">
                    <i class="fas fa-calendar"></i>
                    <span>История</span>
                </a>
                <a href="./analytics.html" class="sidebar__menu-item sidebar__menu-item--active">
                    <i class="fas fa-chart-bar"></i>
                    <span>Аналитика</span>
                </a>
            </nav>

            <!-- Нижний блок -->
            <div class="sidebar__bottom">
                <div class="sidebar__divider"></div>

                <button id="logoutBtn" class="sidebar__logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Выход</span>
                </button>
            </div>
        </aside>

        <!-- Основная область -->
        <main class="main-content">
            <!-- Верх страницы -->
            <div class="analytics__header">
                <div class="analytics__heading">
                    <h1 class="analytics__title">Аналитика</h1>

                    <div class="analytics__actions">
                        <div class="date-picker analytics__date-picker">
                            <i class="fas fa-calendar-alt date-picker__icon"></i>
                            <input type="date" class="date-picker__input date-picker__input--start" id="startDate">
                            <span class="date-picker__separator">—</span>
                            <input type="date" class="date-picker__input date-picker__input--end" id="endDate">
                            <button class="date-picker__reset" id="resetDateRange">
                                <i class="fas fa-undo"></i>
                            </button>
                        </div>
                        
                        <button class="analytics__export-button">
                            <i class="fas fa-download"></i>
                            <span>Экспорт данных</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Основная сетка -->
            <div class="analytics__grid">
                <!-- Левая колонка -->
                <div class="analytics__main">
                    <!-- Карточка среднего индекса настроения -->
                    <div class="mood-index">
                        <div class="mood-index__header">
                            <h2 class="mood-index__title">Средний индекс настроения</h2>
                            <i class="fas fa-info-circle mood-index__info"></i>
                        </div>

                        <div class="mood-index__body">
                            <div class="mood-index__info">
                                <div class="mood-index__value">7.8</div>
                                <div class="mood-index__change">↗ +0.4 за неделю</div>
                            </div>
                            <div class="mood-index__progress">
                                <div class="mood-index__progress-fill"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Карточка нейро-инсайтов -->
                    <div class="neural-insights">
                        <div class="neural-insights__header">
                            <i class="fas fa-bolt neural-insights__icon"></i>
                            <h2 class="neural-insights__title">Нейро-инсайты</h2>
                        </div>
                        <div class="neural-insights__list">
                            <!-- Инсайты будут отрендерены динамически через JS -->
                        </div>
                    </div>

                </div>

                <!-- Правая колонка -->
                <div class="analytics__aside">
                    <!-- Карточка динамики за 7 дней -->
                    <div class="mood-chart">
                        <div class="mood-chart__header">
                            <h2 class="mood-chart__title">Динамика настроения</h2>
                        </div>
                        <div class="mood-chart__body">
                            <canvas id="moodChart"></canvas>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script type="module" src="./js/auth.js"></script>
    <script type="module" src="./js/analytics.js"></script>
</body>

</html>
