<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История - MoodSync</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/history.css">
</head>

<body>
    <div class="app-container">
        <!-- Левый сайдбар -->
        <aside class="sidebar">
            <!-- Блок Главная -->
            <div class="sidebar__profile">
                <div class="sidebar__app-info">
                    <a href="./index.html" class="sidebar__app-name">MoodSync</a>
                    <p class="sidebar__app-tagline">Ежедневный дневник настроения</p>
                </div>
            </div>

            <!-- Вертикальное меню -->
            <nav class="sidebar__menu">
                <a href="./home.html" class="sidebar__menu-item">
                    <i class="fas fa-home"></i>
                    <span>Главная</span>
                </a>
                <a href="./history.html" class="sidebar__menu-item sidebar__menu-item--active">
                    <i class="fas fa-calendar"></i>
                    <span>История</span>
                </a>
                <a href="./analytics.html" class="sidebar__menu-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>Аналитика</span>
                </a>
            </nav>

            <!-- Нижний блок -->
            <div class="sidebar__bottom">
                <div class="sidebar__divider"></div>

                <button id="logoutBtn" class="sidebar__logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Выход</span>
                </button>
            </div>
        </aside>

        <!-- Основная область -->
        <main class="main-content">
            <!-- Верхний header -->
            <header class="history__page-header">
                <h1>История</h1>
                <div class="history__header-actions">
                    <!-- Поле поиска -->
                    <div class="history__search-wrapper">
                        <i class="fas fa-search history__search-icon"></i>
                        <input
                            type="text"
                            class="history__search-input"
                            placeholder="Поиск по записям..."
                            id="searchInput"
                        >
                        <button class="history__search-clear" id="searchClear" style="display: none;">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <!-- Кнопка фильтра -->
                    <button class="history__filter-btn" id="filterBtn">
                        <i class="fas fa-filter"></i>
                        <span class="history__filter-badge" id="filterBadge" style="display: none;">0</span>
                    </button>
                </div>
            </header>

            <!-- Попап фильтров -->
            <div class="history__filter-popup" id="filterPopup">
                <div class="history__filter-popup-content">
                    <div class="history__filter-popup-header">
                        <h3>Фильтры</h3>
                        <button class="history__filter-popup-close" id="filterPopupClose">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="history__filter-popup-body">
                        <!-- Период -->
                        <div class="history__filter-group">
                            <label class="history__filter-group-label">Период</label>
                            <div class="history__filter-options">
                                <label class="history__filter-option">
                                    <input type="radio" name="period" value="all" checked>
                                    <span>За всё время</span>
                                </label>
                                <label class="history__filter-option">
                                    <input type="radio" name="period" value="today">
                                    <span>Сегодня</span>
                                </label>
                                <label class="history__filter-option">
                                    <input type="radio" name="period" value="week">
                                    <span>Неделя</span>
                                </label>
                                <label class="history__filter-option">
                                    <input type="radio" name="period" value="month">
                                    <span>Месяц</span>
                                </label>
                            </div>
                        </div>
                        <!-- Сортировка -->
                        <div class="history__filter-group">
                            <label class="history__filter-group-label">Сортировка</label>
                            <div class="history__filter-options">
                                <label class="history__filter-option">
                                    <input type="radio" name="sort" value="newest" checked>
                                    <span>Сначала новые</span>
                                </label>
                                <label class="history__filter-option">
                                    <input type="radio" name="sort" value="oldest">
                                    <span>Сначала старые</span>
                                </label>
                            </div>
                        </div>
                        <!-- Настроение -->
                        <div class="history__filter-group">
                            <label class="history__filter-group-label">Настроение</label>
                            <div class="history__filter-options">
                                <label class="history__filter-option">
                                    <input type="radio" name="mood" value="all" checked>
                                    <span>Все</span>
                                </label>
                                <label class="history__filter-option">
                                    <input type="radio" name="mood" value="positive">
                                    <span>Позитивные</span>
                                </label>
                                <label class="history__filter-option">
                                    <input type="radio" name="mood" value="neutral">
                                    <span>Нейтральные</span>
                                </label>
                                <label class="history__filter-option">
                                    <input type="radio" name="mood" value="negative">
                                    <span>Негативные</span>
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="history__filter-popup-footer">
                        <button class="history__filter-reset" id="filterReset">
                            <i class="fas fa-redo"></i>
                            <span>Сбросить</span>
                        </button>
                        <button class="history__filter-apply" id="filterApply">
                            <span>Применить</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Список записей -->
            <div class="history__entries-container" id="historyList">
            </div>
        </main>
    </div>


    <!-- Шаблон группы -->
    <template id="historyDateGroupTemplate">
        <div class="history__date-group">
            <h2 class="history__date-title"></h2>

            <div class="history__entries"></div>
        </div>
    </template>

    <!-- Шаблон элемента -->
    <template id="historyEntryTemplate">
        <article class="history__entry-card">
            <div class="history__entry-left">
                <time class="history__entry-time"></time>

                <div class="history__mood-indicator"></div>

                <div class="history__mood-badge"></div>
            </div>

            <div class="history__entry-divider"></div>

            <div class="history__entry-right">
                <a href="" class="history__entry-title"></a>

                <p class="history__entry-text"></p>

                <div class="history__entry-tags"></div>
            </div>
        </article>
    </template>

    <script type="module" src="./js/history.js"></script>
</body>

</html>
