<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест авторизации - MoodSync</title>
    <script src="js/auth.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        input {
            padding: 8px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Тестирование системы авторизации</h1>
    
    <div class="test-section">
        <h2>1. Проверка состояния авторизации</h2>
        <button onclick="testAuthStatus()">Проверить статус</button>
        <div id="authStatusResult"></div>
    </div>

    <div class="test-section">
        <h2>2. Тест входа в систему</h2>
        <input type="text" id="testLogin" placeholder="Логин" value="user_d90cacba">
        <input type="password" id="testPassword" placeholder="Пароль" value="testpass123">
        <button onclick="testLogin()">Войти</button>
        <div id="loginResult"></div>
    </div>

    <div class="test-section">
        <h2>3. Тест получения записей</h2>
        <button onclick="testGetNotes()">Получить записи</button>
        <div id="notesResult"></div>
    </div>

    <div class="test-section">
        <h2>4. Тест выхода из системы</h2>
        <button onclick="testLogout()">Выйти</button>
        <div id="logoutResult"></div>
    </div>

    <script>
        function showResult(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="test-result ${type}">${message}</div>`;
        }

        function testAuthStatus() {
            const isAuth = Auth.isAuth();
            showResult('authStatusResult', 
                `Авторизован: ${isAuth}`, 
                isAuth ? 'success' : 'error'
            );
        }

        async function testLogin() {
            try {
                const login = document.getElementById('testLogin').value;
                const password = document.getElementById('testPassword').value;
                
                const result = await Auth.login(login, password);
                showResult('loginResult', 
                    `Вход успешный! Токен: ${result.access_token.substring(0, 20)}...`, 
                    'success'
                );
                testAuthStatus();
            } catch (error) {
                showResult('loginResult', 
                    `Ошибка входа: ${error.message}`, 
                    'error'
                );
            }
        }

        async function testGetNotes() {
            try {
                if (!Auth.isAuth()) {
                    showResult('notesResult', 
                        'Сначала нужно войти в систему', 
                        'error'
                    );
                    return;
                }

                const response = await Auth.authenticatedFetch("http://127.0.0.1:8000/notes/");
                const notes = await response.json();
                
                showResult('notesResult', 
                    `Получено записей: ${notes.length}<br>` +
                    notes.map(note => 
                        `ID: ${note.id}, Текст: ${note.orig_text.substring(0, 50)}..., Настроение: ${note.sentiment_label}`
                    ).join('<br>'),
                    'success'
                );
            } catch (error) {
                showResult('notesResult', 
                    `Ошибка получения записей: ${error.message}`, 
                    'error'
                );
            }
        }

        function testLogout() {
            Auth.logout();
            showResult('logoutResult', 
                'Выход выполнен успешно', 
                'success'
            );
            testAuthStatus();
        }

        // Автоматическая проверка статуса при загрузке
        window.onload = function() {
            testAuthStatus();
        };
    </script>
</body>
</html>
