<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodSync - Ежедневный дневник настроения</title>

    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="bg-[#faf7f8] text-[#2c3e50]">
    <div class="app-container">
        <!-- Левый сайдбар -->
        <aside class="sidebar">
            <!-- Блок Главная -->
            <div class="sidebar__profile">
                <div class="sidebar__app-info">
                    <a href="./index.html" class="sidebar__app-name">MoodSync</a>
                    <p class="sidebar__app-tagline">Ежедневный дневник настроения</p>
                </div>
            </div>

            <!-- Вертикальное меню -->
            <nav class="sidebar__menu">
                <a href="./home.html" class="sidebar__menu-item sidebar__menu-item--active">
                    <i class="fas fa-home"></i>
                    <span>Главная</span>
                </a>
                <a href="./history.html" class="sidebar__menu-item">
                    <i class="fas fa-calendar"></i>
                    <span>История</span>
                </a>
                <a href="./analytics.html" class="sidebar__menu-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>Аналитика</span>
                </a>
            </nav>

            <!-- Нижний блок -->
            <div class="sidebar__bottom">
                <div class="sidebar__divider"></div>

                <button id="logoutBtn" class="sidebar__logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Выход</span>
                </button>
            </div>
        </aside>

        <!-- Основная область -->
        <main class="main-content">
            <!-- Верхний header -->
            <header class="header">
                <h1 class="header__title">Главная</h1>

                <!-- Аккаунт -->
                <div class="header__account">
                    <div class="header__account-avatar">
                        <i class="fas fa-user"></i>
                    </div>

                    <div class="header__account-info">
                        <p>
                            Логин:
                            <span id="user-login">
                            </span>
                        </p>

                        <p>
                            Имя:
                            <span id="user-name">
                            </span>
                        </p>
                    </div>
                </div>
            </header>

            <!-- Центральная часть -->
            <div class="content">
                <div class="content__header">
                    <h2 class="content__title">Как вы себя чувствуете сегодня?</h2>
                    <p class="content__subtitle">Среда, 25 июня • 14:30</p>
                </div>

                <!-- Карточка формы -->
                <form id="noteForm" class="mood-card">
                    <textarea id="orig_text" name="orig_text" class="mood-card__textarea"
                        placeholder="Начните записывать свои мысли здесь... Позвольте им течь естественно."></textarea>

                    <div class="mood-card__actions pt-4">
                        <!-- Кнопки для добавления доп инфы -->
                        <!-- <div class="mood-card__action-icons">
                            <button class="mood-card__icon-btn">
                                <i class="fas fa-smile"></i>
                            </button>
                            <button class="mood-card__icon-btn">
                                <i class="fas fa-microphone"></i>
                            </button>
                            <button class="mood-card__icon-btn">
                                <i class="fas fa-image"></i>
                            </button>
                        </div> -->

                        <button type="submit" class="mood-card__save-btn">
                            <span>Сохранить запись</span>
                            <i class="fas fa-check"></i>
                        </button>
                    </div>
                </form>

                <!-- Быстрые теги -->
                <!-- <div class="tags">
                    <h3 class="tags__title">БЫСТРЫЕ ТЕГИ</h3>
                    <div class="tags__list">
                        <button class="tags__item tags__item--calm">Спокойствие</button>
                        <button class="tags__item tags__item--anxiety">Тревога</button>
                        <button class="tags__item tags__item--focus">Фокус</button>
                        <button class="tags__item tags__item--fatigue">Усталость</button>
                        <button class="tags__item tags__item--custom">+ Свой тег</button>
                    </div>
                </div> -->
            </div>
        </main>
    </div>

    <div id="toastContainer" class="fixed top-5 right-5 z-50 flex flex-col gap-3">
    </div>

    <script type="module" src="./js/home.js"></script>
</body>

</html>
