name: Deploy MindMood

on:
  push:
    branches:
      - main

jobs:
  lint-backend:
    name: Линтинг Python (black, flake8, isort)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort

      - name: Проверка форматирования (black)
        run: black --check .

      - name: Проверка стиля кода (flake8)
        run: flake8 . --count --show-source --statistics

      - name: Проверка импортов (isort)
        run: isort --check-only .

  lint-frontend:
    name: Линтинг Frontend (ESLint, Stylelint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Установка зависимостей
        run: |
          npm init -y
          npm install --save-dev eslint stylelint stylelint-config-standard

      - name: Линтинг JavaScript
        run: npx eslint . --ext .js

      - name: Линтинг CSS
        run: npx stylelint "**/*.css"

  test-backend:
    name: Тестирование Backend
    runs-on: ubuntu-latest
    needs: lint-backend
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Запуск тестов
        run: pytest tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: backend
          name: backend-coverage

  build-and-deploy:
    name: Сборка и деплой
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Проверка SSH ключа
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          if [ -z "$SSH_KEY" ]; then
            echo "ERROR: SERVER_SSH_KEY not configured in GitHub Secrets"
            exit 1
          fi
        continue-on-error: false

      - name: Подключение к серверу и деплой
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SSH_HOST: ${{ secrets.SERVER_HOST }}
          SSH_USER: ${{ secrets.SERVER_USER || 'root' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/root/mindmood' }}
        run: |
          # Создаём SSH ключ
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

          # Деплой через SSH
          ssh -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" << 'EOF'
            set -e
            cd "$DEPLOY_PATH" || mkdir -p "$DEPLOY_PATH"

            # Клонируем или обновляем репозиторий
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git fetch origin
              git checkout main
              git pull origin main
            fi

            # Собираем и запускаем докер-контейнеры
            docker-compose build --no-cache
            docker-compose down
            docker-compose up -d
          EOF

          # Очистка SSH ключа
          rm -f ~/.ssh/id_rsa
