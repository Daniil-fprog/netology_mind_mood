  test-backend:
    name: Тестирование Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Запуск тестов
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-report=html

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/coverage.xml

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: backend/htmlcov

  build-and-deploy:
    name: Сборка и деплой
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Проверка SSH ключа
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          if [ -z "$SSH_KEY" ]; then
            echo "ERROR: SERVER_SSH_KEY not configured in GitHub Secrets"
            exit 1
          fi
        continue-on-error: false

      - name: Подключение к серверу и деплой
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SSH_HOST: ${{ secrets.SERVER_HOST }}
          SSH_USER: ${{ secrets.SERVER_USER || 'root' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/root/mindmood' }}
          REPOSITORY: ${{ github.repository }}

        run: |
          set -e

          if [ -z "$SSH_KEY" ]; then
            echo "ERROR: SERVER_SSH_KEY not configured"
            exit 1
          fi

          if [ -z "$SSH_HOST" ]; then
            echo "ERROR: SERVER_HOST not configured"
            exit 1
          fi

          if [ -z "$SSH_USER" ]; then
            echo "ERROR: SERVER_USER not configured"
            exit 1
          fi

          if [ -z "$DEPLOY_PATH" ]; then
            echo "ERROR: DEPLOY_PATH not configured"
            exit 1
          fi

          # Создаём SSH ключ (без base64, так как ключ вставляется как есть)
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

          # Деплой через SSH
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o IdentitiesOnly=yes \
              -o BatchMode=yes \
              "$SSH_USER@$SSH_HOST" \
              "DEPLOY_PATH='$DEPLOY_PATH' REPOSITORY='$REPOSITORY' bash -s" << 'EOF'
            set -e

            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            if [ ! -d ".git" ]; then
              git init
              git remote add origin "https://github.com/$REPOSITORY.git" || true
              git fetch origin main
              git checkout -B main origin/main
            else
              git fetch origin main
              git checkout main
              git reset --hard origin/main
            fi

            docker compose build --no-cache
            docker compose down
            docker compose up -d
          EOF

          # Очистка SSH ключа
          rm -f ~/.ssh/id_rsa
